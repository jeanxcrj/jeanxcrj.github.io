<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

/* ---------------------------------- rng ---------------------------------- */
// Seeded so the composition stays curated between reloads.
function mulberry32(seed) {
  return function () {
    seed |= 0; seed = (seed + 0x6D2B79F5) | 0;
    let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
const rand = mulberry32(20260707);
const jitter = (amt) => (rand() * 2 - 1) * amt;

/* ------------------------------- renderer -------------------------------- */
const container = document.getElementById('app');
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.VSMShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.12;
renderer.outputColorSpace = THREE.SRGBColorSpace;
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xf6f6f3);
scene.fog = new THREE.Fog(0xf6f6f3, 26, 70);

const camera = new THREE.PerspectiveCamera(38, window.innerWidth / window.innerHeight, 0.1, 120);
camera.position.set(3.1, 2.75, 5.1);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 3.6, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.minDistance = 3.2;
controls.maxDistance = 26;
controls.minPolarAngle = Math.PI * 0.22;
controls.maxPolarAngle = Math.PI * 0.55;
controls.enablePan = false;      // never slide the target off the pole
controls.autoRotate = true;
controls.autoRotateSpeed = 0.55;
// keep the world up-axis locked so the pole is always dead vertical on screen
camera.up.set(0, 1, 0);

// Subtle image-based reflections for the metals.
const pmrem = new THREE.PMREMGenerator(renderer);
scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;

/* -------------------------------- lights --------------------------------- */
const hemi = new THREE.HemisphereLight(0xffffff, 0xeaeaea, 0.7);
scene.add(hemi);

const key = new THREE.DirectionalLight(0xffffff, 1.9);
key.position.set(6, 11, 5);
key.castShadow = true;
key.shadow.mapSize.set(2048, 2048);
key.shadow.camera.near = 1;
key.shadow.camera.far = 30;
key.shadow.camera.left = -6;
key.shadow.camera.right = 6;
key.shadow.camera.top = 9;
key.shadow.camera.bottom = -3;
key.shadow.bias = -0.0002;
key.shadow.radius = 9;
key.shadow.blurSamples = 16;
scene.add(key);

const fill = new THREE.DirectionalLight(0xffffff, 0.75);
fill.position.set(-7, 5, -4);
scene.add(fill);

/* -------------------------------- ground --------------------------------- */
const ground = new THREE.Mesh(
  new THREE.CircleGeometry(45, 64),
  new THREE.MeshStandardMaterial({ color: 0xf6f6f3, roughness: 0.96, metalness: 0 })
);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

/* ------------------------------- materials ------------------------------- */
const poleMat  = new THREE.MeshStandardMaterial({ color: 0x8f8fe0, metalness: 0.35, roughness: 0.5 });
const armMat   = new THREE.MeshStandardMaterial({ color: 0x7c66df, metalness: 0.4, roughness: 0.48 });
const clampMat = new THREE.MeshStandardMaterial({ color: 0x7c66df, metalness: 0.5, roughness: 0.4 });
const frameMat = new THREE.MeshStandardMaterial({ color: 0xd4d6d9, metalness: 0.9, roughness: 0.3 });
const backMat  = new THREE.MeshStandardMaterial({ color: 0xcfd1d4, metalness: 0.5, roughness: 0.55 });

/* --------------------------------- pole ---------------------------------- */
const POLE_H = 7.4;
const POLE_R = 0.095;
const pole = new THREE.Mesh(new THREE.CylinderGeometry(POLE_R, POLE_R, POLE_H, 32), poleMat);
pole.position.y = POLE_H / 2;
pole.castShadow = true;
pole.receiveShadow = true;
scene.add(pole);

// Rounded cap on top
const cap = new THREE.Mesh(new THREE.SphereGeometry(POLE_R, 24, 16, 0, Math.PI * 2, 0, Math.PI / 2), poleMat);
cap.position.y = POLE_H;
cap.castShadow = true;
scene.add(cap);

// Base flange
const base = new THREE.Mesh(new THREE.CylinderGeometry(POLE_R * 2.4, POLE_R * 2.9, 0.09, 32), clampMat);
base.position.y = 0.045;
base.castShadow = true;
base.receiveShadow = true;
scene.add(base);
const baseRing = new THREE.Mesh(new THREE.CylinderGeometry(POLE_R * 1.5, POLE_R * 1.5, 0.16, 32), clampMat);
baseRing.position.y = 0.12;
baseRing.castShadow = true;
scene.add(baseRing);

/* --------------------------- canvas sign artwork -------------------------- */
function makeCanvas(w, h) {
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  return [c, c.getContext('2d')];
}
function toTexture(canvas) {
  const tex = new THREE.CanvasTexture(canvas);
  tex.colorSpace = THREE.SRGBColorSpace;
  tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
  return tex;
}
function drawArrow(ctx, x, y, len, thick, dir = 1) {
  // dir: 1 = right, -1 = left
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(dir, 1);
  ctx.beginPath();
  const headL = thick * 1.9, headW = thick * 1.75;
  ctx.moveTo(-len / 2, -thick / 2);
  ctx.lineTo(len / 2 - headL, -thick / 2);
  ctx.lineTo(len / 2 - headL, -headW);
  ctx.lineTo(len / 2, 0);
  ctx.lineTo(len / 2 - headL, headW);
  ctx.lineTo(len / 2 - headL, thick / 2);
  ctx.lineTo(-len / 2, thick / 2);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}
const FONT = '"Helvetica Neue", Helvetica, Arial, sans-serif';

// --- horizontal rectangle designs ---
function artDirectionBlue(text, dir) {
  const [c, ctx] = makeCanvas(1024, 342);
  ctx.fillStyle = '#7c66df';
  ctx.fillRect(0, 0, 1024, 342);
  ctx.fillStyle = '#ffffff';
  ctx.font = `bold 130px ${FONT}`;
  ctx.textBaseline = 'middle';
  if (dir > 0) {
    ctx.textAlign = 'left';
    ctx.fillText(text, 70, 178);
    drawArrow(ctx, 880, 171, 180, 34, 1);
  } else {
    ctx.textAlign = 'right';
    ctx.fillText(text, 954, 178);
    drawArrow(ctx, 144, 171, 180, 34, -1);
  }
  return c;
}
function artExitGreen() {
  const [c, ctx] = makeCanvas(1024, 342);
  ctx.fillStyle = '#67d4bb';
  ctx.fillRect(0, 0, 1024, 342);
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 10;
  ctx.strokeRect(26, 26, 972, 290);
  ctx.fillStyle = '#ffffff';
  ctx.font = `bold 150px ${FONT}`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('EXIT 12', 512, 180);
  return c;
}
function artMuseumBlack() {
  const [c, ctx] = makeCanvas(1024, 342);
  ctx.fillStyle = '#8f8fe0';
  ctx.fillRect(0, 0, 1024, 342);
  ctx.fillStyle = '#ffffff';
  ctx.font = `bold 66px ${FONT}`;
  ctx.textAlign = 'right';
  ctx.textBaseline = 'middle';
  ctx.fillText('UNLEARNING', 954, 128);
  ctx.fillText('DESIGN', 954, 216);
  drawArrow(ctx, 150, 171, 190, 34, -1);
  return c;
}

// --- vertical rectangle designs ---
function artOneWay() {
  const [c, ctx] = makeCanvas(400, 1024);
  ctx.fillStyle = '#67d4bb';
  ctx.fillRect(0, 0, 400, 1024);
  ctx.fillStyle = '#ffffff';
  // up arrow
  ctx.save();
  ctx.translate(200, 250);
  ctx.rotate(-Math.PI / 2);
  drawArrow(ctx, 0, 0, 300, 52, 1);
  ctx.restore();
  ctx.font = `bold 105px ${FONT}`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('ONE', 200, 570);
  ctx.fillText('WAY', 200, 700);
  ctx.fillRect(60, 810, 280, 12);
  ctx.font = `bold 56px ${FONT}`;
  ctx.fillText('N°7', 200, 900);
  return c;
}
function artKilometer() {
  const [c, ctx] = makeCanvas(400, 1024);
  ctx.fillStyle = '#f5f5f3';
  ctx.fillRect(0, 0, 400, 1024);
  ctx.fillStyle = '#7c66df';
  ctx.fillRect(0, 0, 400, 190);
  ctx.fillStyle = '#ffffff';
  ctx.font = `bold 92px ${FONT}`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('KM', 200, 102);
  ctx.fillStyle = '#7c66df';
  ctx.font = `bold 300px ${FONT}`;
  ctx.fillText('4', 200, 480);
  ctx.fillText('2', 200, 790);
  return c;
}

// --- square designs ---
function artParking() {
  const [c, ctx] = makeCanvas(640, 640);
  ctx.fillStyle = '#7c66df';
  ctx.fillRect(0, 0, 640, 640);
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 14;
  ctx.strokeRect(30, 30, 580, 580);
  ctx.fillStyle = '#ffffff';
  ctx.font = `bold 420px ${FONT}`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('P', 320, 348);
  return c;
}
function artHazardStripes() {
  const [c, ctx] = makeCanvas(640, 640);
  ctx.fillStyle = '#b0f25a';
  ctx.fillRect(0, 0, 640, 640);
  ctx.fillStyle = '#7c66df';
  const s = 110;
  ctx.save();
  ctx.beginPath();
  ctx.rect(0, 0, 640, 640);
  ctx.clip();
  for (let i = -8; i < 10; i++) {
    ctx.beginPath();
    ctx.moveTo(i * s, 700);
    ctx.lineTo(i * s + 700, 0);
    ctx.lineTo(i * s + 700 + s / 2, 0);
    ctx.lineTo(i * s + s / 2, 700);
    ctx.closePath();
    ctx.fill();
  }
  ctx.restore();
  return c;
}

// --- circle designs ---
function artSpeed30() {
  const [c, ctx] = makeCanvas(640, 640);
  ctx.fillStyle = '#ffffff';
  ctx.beginPath(); ctx.arc(320, 320, 320, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#7c66df';
  ctx.lineWidth = 62;
  ctx.beginPath(); ctx.arc(320, 320, 278, 0, Math.PI * 2); ctx.stroke();
  ctx.fillStyle = '#7c66df';
  ctx.font = `bold 250px ${FONT}`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('30', 320, 338);
  return c;
}
function artNoEntry() {
  const [c, ctx] = makeCanvas(640, 640);
  ctx.fillStyle = '#7c66df';
  ctx.beginPath(); ctx.arc(320, 320, 320, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#ffffff';
  const w = 420, h = 96;
  ctx.fillRect(320 - w / 2, 320 - h / 2, w, h);
  return c;
}
function artMandatoryUp() {
  const [c, ctx] = makeCanvas(640, 640);
  ctx.fillStyle = '#7c66df';
  ctx.beginPath(); ctx.arc(320, 320, 320, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 18;
  ctx.beginPath(); ctx.arc(320, 320, 288, 0, Math.PI * 2); ctx.stroke();
  ctx.fillStyle = '#ffffff';
  ctx.save();
  ctx.translate(320, 320);
  ctx.rotate(-Math.PI / 4);
  drawArrow(ctx, 0, 0, 330, 58, 1);
  ctx.restore();
  return c;
}

// --- triangle designs (drawn to fit the triangle's bounding box) ---
function artWarning() {
  const [c, ctx] = makeCanvas(640, 576);
  // white triangle with red border, exclamation mark
  const apex = [320, 26], bl = [30, 546], br = [610, 546];
  const tri = (inset) => {
    const cx = 320, cy = 372; // rough centroid
    ctx.beginPath();
    [[apex, 0], [br, 1], [bl, 2]].forEach(([p], i) => {
      const x = p[0] + (cx - p[0]) * inset;
      const y = p[1] + (cy - p[1]) * inset;
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    });
    ctx.closePath();
  };
  ctx.fillStyle = '#7c66df';
  tri(0); ctx.fill();
  ctx.fillStyle = '#ffffff';
  tri(0.22); ctx.fill();
  ctx.fillStyle = '#7c66df';
  ctx.font = `bold 230px ${FONT}`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('!', 320, 400);
  return c;
}
function artYield() {
  const [c, ctx] = makeCanvas(640, 576);
  const apex = [320, 26], bl = [30, 546], br = [610, 546];
  const tri = (inset) => {
    const cx = 320, cy = 372;
    ctx.beginPath();
    [[apex], [br], [bl]].forEach(([p], i) => {
      const x = p[0] + (cx - p[0]) * inset;
      const y = p[1] + (cy - p[1]) * inset;
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    });
    ctx.closePath();
  };
  ctx.fillStyle = '#b0f25a';
  tri(0); ctx.fill();
  ctx.fillStyle = '#7c66df';
  tri(0.16); ctx.fill();
  ctx.fillStyle = '#b0f25a';
  tri(0.3); ctx.fill();
  ctx.fillStyle = '#7c66df';
  ctx.font = `bold 120px ${FONT}`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('7%', 320, 430);
  return c;
}

/* --------------------------- geometry helpers ----------------------------- */
const SIGN_T = 0.035;   // sign panel thickness
const FRAME_W = 0.045;  // frame border width
const FRAME_D = SIGN_T + 0.022;

function remapUVsToBounds(geometry) {
  geometry.computeBoundingBox();
  const bb = geometry.boundingBox;
  const sx = bb.max.x - bb.min.x, sy = bb.max.y - bb.min.y;
  const pos = geometry.attributes.position;
  const uv = geometry.attributes.uv;
  for (let i = 0; i < pos.count; i++) {
    uv.setXY(i, (pos.getX(i) - bb.min.x) / sx, (pos.getY(i) - bb.min.y) / sy);
  }
  uv.needsUpdate = true;
}

function roundedPolygonShape(points, radius) {
  const shape = new THREE.Shape();
  const n = points.length;
  for (let i = 0; i < n; i++) {
    const p = points[i];
    const prev = points[(i + n - 1) % n];
    const next = points[(i + 1) % n];
    const dPrev = p.clone().sub(prev).normalize();
    const dNext = next.clone().sub(p).normalize();
    const pA = p.clone().sub(dPrev.clone().multiplyScalar(radius));
    const pB = p.clone().add(dNext.clone().multiplyScalar(radius));
    if (i === 0) shape.moveTo(pA.x, pA.y); else shape.lineTo(pA.x, pA.y);
    shape.quadraticCurveTo(p.x, p.y, pB.x, pB.y);
  }
  shape.closePath();
  return shape;
}

/* ------------------------------ sign builders ----------------------------- */
// Every builder returns a group whose back plane sits at z = 0 and faces +z.
const faceMeshes = []; // for raycasting

function faceMaterial(canvas) {
  return new THREE.MeshStandardMaterial({
    map: toTexture(canvas),
    metalness: 0.35,
    roughness: 0.42,
  });
}

function buildRectSign(w, h, canvas) {
  const g = new THREE.Group();
  const faceMat = faceMaterial(canvas);
  // box faces: +x -x +y -y +z -z  → texture on +z
  const panel = new THREE.Mesh(
    new THREE.BoxGeometry(w, h, SIGN_T),
    [backMat, backMat, backMat, backMat, faceMat, backMat]
  );
  panel.position.z = SIGN_T / 2;
  panel.castShadow = true;
  panel.receiveShadow = true;
  g.add(panel);
  faceMeshes.push(panel);

  // metal frame — four bars around the perimeter
  const bars = [
    [w + FRAME_W * 2, FRAME_W, 0, h / 2 + FRAME_W / 2],
    [w + FRAME_W * 2, FRAME_W, 0, -h / 2 - FRAME_W / 2],
    [FRAME_W, h, -w / 2 - FRAME_W / 2, 0],
    [FRAME_W, h, w / 2 + FRAME_W / 2, 0],
  ];
  for (const [bw, bh, bx, by] of bars) {
    const bar = new THREE.Mesh(new THREE.BoxGeometry(bw, bh, FRAME_D), frameMat);
    bar.position.set(bx, by, SIGN_T / 2);
    bar.castShadow = true;
    bar.receiveShadow = true;
    g.add(bar);
  }
  g.userData.halfWidth = w / 2;
  g.userData.topY = h / 2 + FRAME_W;
  return g;
}

function buildCircleSign(r, canvas) {
  const g = new THREE.Group();
  // gray metal body
  const body = new THREE.Mesh(new THREE.CylinderGeometry(r, r, SIGN_T, 48), backMat);
  body.rotation.x = Math.PI / 2;
  body.position.z = SIGN_T / 2;
  body.castShadow = true;
  body.receiveShadow = true;
  g.add(body);
  // textured face, floated a hair in front
  const face = new THREE.Mesh(new THREE.CircleGeometry(r * 0.995, 48), faceMaterial(canvas));
  face.position.z = SIGN_T + 0.002;
  face.receiveShadow = true;
  g.add(face);
  faceMeshes.push(face);
  // circular metal rim
  const rim = new THREE.Mesh(new THREE.TorusGeometry(r + 0.012, 0.032, 20, 64), frameMat);
  rim.position.z = SIGN_T / 2;
  rim.castShadow = true;
  rim.receiveShadow = true;
  g.add(rim);
  g.userData.halfWidth = r;
  g.userData.topY = r + 0.045;
  return g;
}

function buildShapeSign(shape, halfW, canvas) {
  const g = new THREE.Group();

  // gray metal body (extruded, slightly rounded corners)
  const bodyGeo = new THREE.ExtrudeGeometry(shape, { depth: SIGN_T, bevelEnabled: false, curveSegments: 10 });
  const body = new THREE.Mesh(bodyGeo, backMat);
  body.castShadow = true;
  body.receiveShadow = true;
  g.add(body);

  // textured face
  const faceGeo = new THREE.ShapeGeometry(shape, 10);
  remapUVsToBounds(faceGeo);
  const face = new THREE.Mesh(faceGeo, faceMaterial(canvas));
  face.scale.set(0.985, 0.985, 1);
  face.position.z = SIGN_T + 0.002;
  face.receiveShadow = true;
  g.add(face);
  faceMeshes.push(face);

  // metal frame tube traced along the outline
  const outline = shape.getPoints(48).map((p) => new THREE.Vector3(p.x, p.y, SIGN_T / 2));
  const curve = new THREE.CatmullRomCurve3(outline, true, 'catmullrom', 0.0);
  const tube = new THREE.Mesh(new THREE.TubeGeometry(curve, 140, 0.03, 12, true), frameMat);
  tube.castShadow = true;
  tube.receiveShadow = true;
  g.add(tube);

  g.userData.halfWidth = halfW;
  faceGeo.computeBoundingBox();
  g.userData.topY = faceGeo.boundingBox.max.y + 0.04;
  return g;
}
function buildTriangleSign(size, canvas) {
  const R = size * 0.62;
  const pts = [90, 210, 330].map((deg) => {
    const a = (deg * Math.PI) / 180;
    return new THREE.Vector2(Math.cos(a) * R, Math.sin(a) * R);
  });
  return buildShapeSign(roundedPolygonShape(pts, size * 0.09), size * 0.5, canvas);
}
function buildDiamondSign(size, canvas) {
  const R = size * 0.72;
  const pts = [90, 180, 270, 0].map((deg) => {
    const a = (deg * Math.PI) / 180;
    return new THREE.Vector2(Math.cos(a) * R, Math.sin(a) * R);
  });
  return buildShapeSign(roundedPolygonShape(pts, size * 0.12), R, canvas);
}

/* --------------------------- pole hardware bits --------------------------- */
function addClampRing(y, extraBolt = true) {
  const ring = new THREE.Mesh(
    new THREE.CylinderGeometry(POLE_R + 0.022, POLE_R + 0.022, 0.085, 32),
    clampMat
  );
  ring.position.y = y;
  ring.castShadow = true;
  ring.receiveShadow = true;
  scene.add(ring);
  if (extraBolt) {
    const bolt = new THREE.Mesh(new THREE.BoxGeometry(0.045, 0.06, 0.045), clampMat);
    const a = rand() * Math.PI * 2;
    bolt.position.set(Math.cos(a) * (POLE_R + 0.035), y, Math.sin(a) * (POLE_R + 0.035));
    bolt.castShadow = true;
    scene.add(bolt);
  }
  return ring;
}

/* ------------------------------- mounting --------------------------------- */
const signs = []; // { pivot, group, baseRotZ, wobble, wobbleVel }


function mountSign(group, { height, angleDeg, dist, tiltZ = 0, tiltX = 0, twistY = 0, post = null }) {
  // pivot sits on the pole axis; sign extends along local +z
  const pivot = new THREE.Group();
  pivot.position.y = height;
  pivot.rotation.y = (angleDeg * Math.PI) / 180;
  scene.add(pivot);

  // everything hanging off the pole at this height grows in as one assembly,
  // so the intro starts from a bare pole
  const assembly = new THREE.Group();
  pivot.add(assembly);

  const holder = new THREE.Group();
  holder.position.z = POLE_R + dist;
  holder.rotation.set(tiltX, twistY, tiltZ);
  assembly.add(holder);
  holder.add(group);

  // clamp ring on the pole at this height (local to the assembly)
  const ring = new THREE.Mesh(
    new THREE.CylinderGeometry(POLE_R + 0.022, POLE_R + 0.022, 0.085, 32),
    clampMat
  );
  ring.castShadow = true;
  ring.receiveShadow = true;
  assembly.add(ring);
  const boltA = rand() * Math.PI * 2;
  const bolt = new THREE.Mesh(new THREE.BoxGeometry(0.045, 0.06, 0.045), clampMat);
  bolt.position.set(Math.cos(boltA) * (POLE_R + 0.035), 0, Math.sin(boltA) * (POLE_R + 0.035));
  bolt.castShadow = true;
  assembly.add(bolt);

  // support arm from the pole to the back of the sign
  const armLen = dist + POLE_R * 0.7;
  const arm = new THREE.Mesh(new THREE.CylinderGeometry(0.032, 0.032, armLen, 16), armMat);
  arm.rotation.x = Math.PI / 2;
  arm.position.z = POLE_R * 0.3 + armLen / 2;
  arm.castShadow = true;
  arm.receiveShadow = true;
  assembly.add(arm);

  // small mounting plate on the sign back
  const plate = new THREE.Mesh(new THREE.BoxGeometry(0.14, 0.14, 0.02), armMat);
  plate.position.z = -0.01;
  group.add(plate);


  signs.push({ pivot, assembly, holder, group, post, height, angleDeg, wobble: 0, wobbleVel: 0, phase: rand() * Math.PI * 2 });
  return pivot;
}

        el.appendChild(row);
      }
    } else if (b.t === 'h2') {
      el = document.createElement('h2');
      el.textContent = b.x;
    } else if (b.t === 'divider') {
      el = document.createElement('div');
      el.className = 'divider';
    } else {
      el = document.createElement('p');
      el.textContent = b.x;
    }
    holder.appendChild(el);
  }
}
function openPage(post) {
  document.getElementById('pg-title').textContent = post.title;
  const meta = document.getElementById('pg-meta');
  meta.innerHTML = '';
  const date = document.createElement('span');
  date.textContent = post.date;
  meta.appendChild(date);
  for (const [name, color] of post.tags) {
    const pill = document.createElement('span');
    pill.className = 'pill ' + color;
    pill.textContent = name;
    meta.appendChild(pill);
  }
  renderBlocks(post.blocks);
  document.querySelector('#page .m-body').scrollTop = 0;
  pageEl.classList.add('open');
  pageOpen = true;
  controls.autoRotate = false;
  document.body.style.cursor = 'default';
}
function closePage() {
  pageEl.classList.remove('open');
  pageOpen = false;
  if (!focusSign) controls.autoRotate = true;
}

/* ------------------------ left side tab (always visible) ------------------------ */
// hovering a title eases the view around to face that sign and nudges it
const _sph = new THREE.Spherical();
let focusSign = null;

function focusOn(sign) {
  focusSign = sign;
  controls.autoRotate = false;
  sign.wobbleVel += 2.6 + rand(); // give it a little nudge
}
function unfocus() {
  focusSign = null;
  if (!pageOpen) controls.autoRotate = true;
}

{
  const list = document.getElementById('sb-list');

  // only real writings, in pole order; each gets an accent swatch
  const SWATCHES = ['#a6e64d', '#67d4bb', '#8f8fe0', '#f2b63d', '#e8547e'];
  const written = signs.filter((s) => s.post && !s.post.placeholder);
  written.forEach((sign, i) => {
    const item = document.createElement('div');
    item.className = 'sb-item';
    item.style.setProperty('--c', SWATCHES[i % SWATCHES.length]);
    const sw = document.createElement('span');
    sw.className = 'sw';
    const t = document.createElement('span');
    t.className = 't';
    t.textContent = sign.post.title;
    item.append(sw, t);
    item.addEventListener('mouseenter', () => focusOn(sign));
    item.addEventListener('mouseleave', unfocus);
    item.addEventListener('click', () => openPage(sign.post));
    list.appendChild(item);
  });
}
// drag the corner grip to resize the modal
{
  const modal = document.getElementById('plaque');
  const grip = document.getElementById('m-grip');
  let rs = null;
  grip.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    e.stopPropagation();
    rs = { x: e.clientX, y: e.clientY, w: modal.offsetWidth, h: modal.offsetHeight };
    grip.setPointerCapture(e.pointerId);
  });
  grip.addEventListener('pointermove', (e) => {
    if (!rs) return;
    const w = Math.min(window.innerWidth * 0.96, Math.max(400, rs.w + (e.clientX - rs.x) * 2));
    const h = Math.min(window.innerHeight * 0.92, Math.max(320, rs.h + (e.clientY - rs.y) * 2));
    modal.style.width = w + 'px';
    modal.style.height = h + 'px';
    modal.style.maxHeight = 'none';
  });
  const stop = () => { rs = null; };
  grip.addEventListener('pointerup', stop);
  grip.addEventListener('pointercancel', stop);
}

document.getElementById('pg-close').addEventListener('click', closePage);
pageEl.addEventListener('click', closePage);
document.getElementById('plaque').addEventListener('click', (e) => e.stopPropagation());
window.addEventListener('keydown', (e) => { if (e.key === 'Escape') closePage(); });

/* ------------------------------ interaction ------------------------------- */
const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2(-10, -10);
let hovered = null;
let pointerDown = { x: 0, y: 0, moved: false };

function findSignFor(object) {
  return signs.find((s) => {
    let hit = false;
    s.group.traverse((o) => { if (o === object) hit = true; });
    return hit;
  });
}

renderer.domElement.addEventListener('pointermove', (e) => {
  pointer.x = (e.clientX / window.innerWidth) * 2 - 1;
  pointer.y = -(e.clientY / window.innerHeight) * 2 + 1;
  if (Math.abs(e.clientX - pointerDown.x) + Math.abs(e.clientY - pointerDown.y) > 6) {
    pointerDown.moved = true;
  }
});
renderer.domElement.addEventListener('pointerdown', (e) => {
  pointerDown = { x: e.clientX, y: e.clientY, moved: false };
});
renderer.domElement.addEventListener('pointerup', (e) => {
  if (pointerDown.moved || pageOpen) return;
  pointer.x = (e.clientX / window.innerWidth) * 2 - 1;
  pointer.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(pointer, camera);
  const hits = raycaster.intersectObjects(faceMeshes, false);
  const s = hits.length ? findSignFor(hits[0].object) : null;
  if (!s) return;
  s.wobbleVel += 2.4 + rand(); // a little nudge on the way in
  if (s.post) openPage(s.post);
});

/* -------------------------------- animate --------------------------------- */
const clock = new THREE.Clock();
let introT = 0;

// intro: the pole starts bare; each clamp+arm+sign assembly grows out of it
for (const s of signs) s.assembly.scale.setScalar(0.0001);

function easeOutBack(t) {
  const c1 = 1.30158, c3 = c1 + 1;
  return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
}

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  const t = clock.elapsedTime;
  introT += dt;

  // staggered intro
  signs.forEach((s, i) => {
    const local = THREE.MathUtils.clamp((introT - 0.35 - i * 0.09) / 0.55, 0, 1);
    const k = local >= 1 ? 1 : Math.max(0.0001, easeOutBack(local));
    s.assembly.scale.setScalar(k);
  });

  // wobble springs + faint idle sway

  for (const s of signs) {
    const stiffness = 26, damping = 4.2;
    s.wobbleVel += -s.wobble * stiffness * dt - s.wobbleVel * damping * dt;
    s.wobble += s.wobbleVel * dt;
    const idle = Math.sin(t * 0.7 + s.phase) * 0.006;
    s.holder.rotation.z = (s.holder.userData.baseZ ??= s.holder.rotation.z) + idle;
    s.group.rotation.x = s.wobble * 0.12;
  }

  // hover
  if (!pageOpen) {
    raycaster.setFromCamera(pointer, camera);
    const hits = raycaster.intersectObjects(faceMeshes, false);
    const found = hits.length ? findSignFor(hits[0].object) : null;
    if (found !== hovered) {
      hovered = found;
      document.body.style.cursor = hovered ? 'pointer' : 'default';
    }
  }

  // hard-anchor the orbit target to the pole axis so the pole never leans
  controls.target.x = 0;
  controls.target.z = 0;

  // ease the view to face a hovered sidebar sign
  if (focusSign) {
    const off = camera.position.clone().sub(controls.target);
    _sph.setFromVector3(off);
    const wantTheta = (focusSign.angleDeg * Math.PI) / 180;
    let dT = wantTheta - _sph.theta;
    dT = Math.atan2(Math.sin(dT), Math.cos(dT)); // shortest way around
    _sph.theta += dT * Math.min(1, dt * 2.6);
    off.setFromSpherical(_sph);
    camera.position.copy(controls.target).add(off);
    const wantY = THREE.MathUtils.clamp(focusSign.height, 1.2, 6.2);
    controls.target.y += (wantY - controls.target.y) * Math.min(1, dt * 2.6);
  }

  controls.update();
  renderer.render(scene, camera);
}
animate();

document.getElementById('loader').classList.add('done');

/* -------------------------------- resize ---------------------------------- */
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
